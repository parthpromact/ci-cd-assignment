name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Job 1: Test Backend
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run linting
        working-directory: ./backend
        run: npm run lint || echo "No lint script found"
        continue-on-error: true

      - name: Run tests
        working-directory: ./backend
        run: npm test || echo "No test script found"
        continue-on-error: true

  # Job 2: Test Frontend
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linting
        working-directory: ./frontend
        run: npm run lint || echo "No lint script found"
        continue-on-error: true

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --passWithNoTests
        continue-on-error: true

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: /api

  # Job 3: Build and Push Docker Images
  build-and-push:
    name: Build and Push Docker Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/mern-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mern-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mern-backend:buildcache,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            REACT_APP_API_URL=/api
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/mern-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mern-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mern-frontend:buildcache,mode=max

  # Job 4: Deploy to EC2
  deploy:
    name: Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create SSH key file
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Copy files to EC2
        run: |
          scp -i ec2_key.pem -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            mongodb.env \
            redis.env \
            ubuntu@${{ secrets.EC2_HOST }}:~/mern-app/

      - name: Copy backend env file
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > backend.env
          scp -i ec2_key.pem -o StrictHostKeyChecking=no \
            backend.env \
            ubuntu@${{ secrets.EC2_HOST }}:~/mern-app/backend.env
          rm backend.env

      - name: Deploy to EC2
        run: |
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/mern-app
            
            # Create backend directory if it doesn't exist
            mkdir -p backend
            
            # Move backend.env to the correct location
            mv backend.env backend/.env
            
            # Pull latest images
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export IMAGE_TAG=${{ github.sha }}
            
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/mern-backend:${{ github.sha }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/mern-frontend:${{ github.sha }}
            
            # Stop and remove old containers (keep volumes)
            docker-compose -f docker-compose.prod.yml down
            
            # Start new containers
            docker-compose -f docker-compose.prod.yml up -d
            
            # Clean up old images
            docker image prune -f
            
            # Show running containers
            docker ps
            
            echo "Deployment completed successfully!"
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ec2_key.pem

      - name: Health Check
        run: |
          sleep 30
          curl -f http://${{ secrets.EC2_HOST }}/api/health || exit 1
          echo "Application is healthy!"

  # Job 5: Notify on Slack (Optional)
  notify:
    name: Notify Deployment Status
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          echo "Application URL: http://${{ secrets.EC2_HOST }}"

      - name: Deployment Failed
        if: needs.deploy.result != 'success'
        run: |
          echo "❌ Deployment failed!"
          exit 1